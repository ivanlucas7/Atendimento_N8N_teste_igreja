name: Deploy para GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch: # permite rodar manualmente pela interface do GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # Gera os config.js a partir dos Secrets do GitHub (nunca ficam no código)
      - name: Gerar docs/config.js
        env:
          WEBHOOK_URL:       ${{ secrets.GRACA_WEBHOOK_URL }}
          API_KEY:           ${{ secrets.GRACA_API_KEY }}
        run: |
          cat > docs/config.js << EOF
          window.GracaWidgetConfig = {
            webhookTextUrl: '${WEBHOOK_URL}',
            apiKey:         '${API_KEY}',
          };
          EOF

      - name: Gerar chat/config.js
        env:
          WEBHOOK_URL:       ${{ secrets.GRACA_WEBHOOK_URL }}
          WEBHOOK_AUDIO_URL: ${{ secrets.GRACA_WEBHOOK_AUDIO_URL }}
          API_KEY:           ${{ secrets.GRACA_API_KEY }}
        run: |
          mkdir -p docs/chat
          cp chat/index.html docs/chat/index.html
          cp chat/script.js  docs/chat/script.js
          cp chat/style.css  docs/chat/style.css
          cat > docs/chat/config.js << EOF
          window.GracaChatConfig = {
            webhookTextUrl:  '${WEBHOOK_URL}',
            webhookAudioUrl: '${WEBHOOK_AUDIO_URL}',
            apiKey:          '${API_KEY}',
          };
          EOF

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Empacotar arquivos para o Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
